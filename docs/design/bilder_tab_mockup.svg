<svg width="900" height="580" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000015"/>
    </filter>
  </defs>

  <!-- Hintergrund -->
  <rect width="900" height="580" fill="#f1f5f9"/>

  <!-- ===== TAB-LEISTE ===== -->
  <rect width="900" height="42" fill="white"/>

  <!-- Tab: Stammdaten -->
  <rect x="10" y="8" width="100" height="28" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="60" y="26" text-anchor="middle" fill="#64748b" font-size="12">Stammdaten</text>

  <!-- Tab: Preise -->
  <rect x="116" y="8" width="68" height="28" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="150" y="26" text-anchor="middle" fill="#64748b" font-size="12">Preise</text>

  <!-- Tab: Lager -->
  <rect x="190" y="8" width="60" height="28" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="26" text-anchor="middle" fill="#64748b" font-size="12">Lager</text>

  <!-- Tab: Bilder (AKTIV) — ragt bis zur Trennlinie und überdeckt sie -->
  <rect x="256" y="4" width="68" height="39" rx="4" fill="white" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="258" y="40" width="64" height="4" fill="white"/>
  <text x="290" y="27" text-anchor="middle" fill="#2563eb" font-size="12" font-weight="600">Bilder</text>

  <!-- Tab: Merkmale -->
  <rect x="330" y="8" width="80" height="28" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="370" y="26" text-anchor="middle" fill="#64748b" font-size="12">Merkmale</text>

  <!-- Tab: Texte -->
  <rect x="416" y="8" width="56" height="28" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="444" y="26" text-anchor="middle" fill="#64748b" font-size="12">Texte</text>

  <!-- Trennlinie -->
  <line x1="0" y1="42" x2="900" y2="42" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ===== INHALTSBEREICH ===== -->
  <rect y="42" width="900" height="538" fill="white"/>

  <!-- ===== DROP-ZONE ===== -->
  <rect x="20" y="56" width="860" height="108" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="2" stroke-dasharray="8,5"/>

  <!-- Upload-Pfeil (SVG-Pfad) -->
  <g transform="translate(450, 95)">
    <line x1="0" y1="16" x2="0" y2="-10" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
    <polyline points="-10,-2 0,-16 10,-2" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="-16" y1="16" x2="16" y2="16" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  </g>

  <text x="450" y="122" text-anchor="middle" fill="#1d4ed8" font-size="13" font-weight="500">Bilder hier reinziehen oder klicken</text>
  <text x="450" y="140" text-anchor="middle" fill="#94a3b8" font-size="11">JPG, PNG, WEBP  ·  Mehrere Dateien gleichzeitig möglich  ·  max. 10 MB pro Datei</text>

  <!-- ===== INFOZEILE ===== -->
  <text x="20" y="186" fill="#64748b" font-size="12">4 Bilder hochgeladen</text>

  <!-- Synchronisieren-Button -->
  <rect x="733" y="170" width="147" height="30" rx="5" fill="#2563eb"/>
  <text x="806" y="189" text-anchor="middle" fill="white" font-size="12" font-weight="500">↑ Synchronisieren  ▾</text>

  <!-- ============================================================ -->
  <!-- KARTE 1 — Hauptbild (x=20) -->
