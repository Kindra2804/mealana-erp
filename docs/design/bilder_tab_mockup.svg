  <rect x="20" y="202" width="200" height="255" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>

  <!-- Bildbereich -->
  <rect x="21" y="203" width="198" height="130" fill="#dde1e7" rx="5"/>
  <!-- Bild-Platzhalter-Icon -->
  <rect x="95" y="248" width="50" height="38" rx="3" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
  <circle cx="107" cy="259" r="5" fill="#9ca3af"/>
  <polyline points="95,285 112,268 125,277 135,263 145,285" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linejoin="round"/>

