  <rect x="244" y="378" width="186" height="24" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="251" y="394" fill="#94a3b8" font-size="10">Alt-Text (SEO)...</text>

  <circle cx="247" cy="417" r="4" fill="#22c55e"/>
  <text x="256" y="421" fill="#22c55e" font-size="10">Shop 1: synchronisiert</text>
  <rect x="244" y="432" width="7" height="2" rx="1" fill="#cbd5e1"/>
  <text x="256" y="437" fill="#94a3b8" font-size="10">Shop 2: nicht synchronisiert</text>

