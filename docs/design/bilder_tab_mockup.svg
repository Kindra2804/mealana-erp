  <polyline points="746,285 763,268 776,277 786,263 796,285" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linejoin="round"/>

  <rect x="678" y="345" width="32" height="24" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="694" y="361" text-anchor="middle" fill="#6b7280" font-size="13">↑</text>
  <rect x="715" y="345" width="32" height="24" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
